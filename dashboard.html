<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange Rate Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.2.1/dist/chartjs-plugin-zoom.min.js"></script>

</head>

<body>

    <nav>

        <div class="nav-left">

            <a href="index.html" class="back-btn" title="Back to Home">
                <i class="fa-solid fa-arrow-left"></i>
                Back
            </a>

            <div class="logo">
                <i class="fa-solid fa-money-bill-trend-up"></i>
                ExchangeRate Dashboard
            </div>

        </div>

        <div class="nav-right">
            <span id="lastUpdate"> </span>
        </div>

    </nav>

    <!-- ================= MAIN ================= -->

    <div class="container">

        <!-- LEFT PANEL -->

        <div class="left-panel">

            <div class="card">

                <h2>
                    Currency Converter
                </h2>

                <div class="form-group">

                    <label>Amount</label>

                    <input type="number" id="amount" value="1" min="1">

                </div>

                <div class="currency-row">

                    <div class="form-group">

                        <label>From</label>

                        <select id="from">
                        </select>

                    </div>

                    <button id="swapBtn" title="Swap currencies">

                        <i class="fa-solid fa-right-left"></i>

                    </button>

                    <div class="form-group">

                        <label>To</label>

                        <select id="to">
                        </select>

                    </div>

                </div>

                <div class="result-box">

                    <input type="text" id="result" readonly>

                    <p id="rate"></p>

                    <p id="error"></p>

                </div>

                <button class="track-btn" id="trackBtn">

                    <i class="fa-solid fa-chart-line"></i>
                    Track This Pair

                </button>

            </div>

            <!-- DASHBOARD CARDS -->

            <div class="dashboard">

                <div class="info-card">

                    <h3>Current Rate</h3>

                    <span id="currentRate">--</span>

                </div>

                <div class="info-card">

                    <h3>24h Change</h3>

                    <span id="change24h" class="neutral">--</span>

                </div>

                <div class="info-card">

                    <h3>Base</h3>

                    <span id="baseCurrency">USD</span>

                </div>

                <div class="info-card">

                    <h3>Target</h3>

                    <span id="targetCurrency">PHP</span>

                </div>

            </div>

        </div>

        <!-- RIGHT PANEL -->

        <div class="right-panel">

            <!-- REALTIME TRACKER -->

            <div class="card">

                <div class="tracker-header">

                    <h2>Currency History Data</h2>

                    <span id="trackerPairLabel" class="tracker-pair">USD &rarr; PHP</span>

                </div>

                <div class="pair-chips" id="pairChips">

                    <button class="chip active" data-from="USD" data-to="PHP">USD/PHP</button>
                    <button class="chip" data-from="EUR" data-to="PHP">EUR/PHP</button>
                    <button class="chip" data-from="JPY" data-to="PHP">JPY/PHP</button>
                    <button class="chip" data-from="GBP" data-to="PHP">GBP/PHP</button>
                    <button class="chip" data-from="USD" data-to="EUR">USD/EUR</button>

                </div>

                <!-- RANGE TABS & CUSTOM DATE-RANGE PICKER -->

                <div class="range-tabs-wrapper">

                    <div class="range-tabs">
                        <button class="range-tab active" data-range="1D">1D</button>
                        <button class="range-tab" data-range="1W">1W</button>
                        <button class="range-tab" data-range="1M">1M</button>
                        <button class="range-tab" data-range="1Y">1Y</button>
                    </div>

                    <div class="custom-date-picker">

                        <div class="date-field">

                            <label for="startDate">From:</label>

                            <input type="date" id="startDate">

                        </div>

                        <div class="date-field">

                            <label for="endDate">To:</label>

                            <input type="date" id="endDate">

                        </div>

                    </div>

                </div>

                <div class="tracker-stats">

                    <span id="trackerRate">--</span>

                    <span id="trackerChange" class="neutral">--</span>

                </div>

                <div class="chart-wrap">

                    <div class="chart-toolbar">
                        <button id="exportCsvBtn" title="Export CSV">Export CSV</button>
                        <button id="resetZoomBtn" title="Reset Zoom">Reset Zoom</button>
                    </div>

                    <canvas id="rateChart"></canvas>

                    <p id="trackerNote"></p>

                </div>

            </div>

            <!-- CURRENCY TABLE -->

            <div class="card">

                <h2>

                    Currency Table

                </h2>

                <div class="table-scroll">

                    <table>

                        <thead>

                            <tr>

                                <th>Currency</th>

                                <th>Rate</th>

                            </tr>

                        </thead>

                        <tbody id="rateTable">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
